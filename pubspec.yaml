name: youth_safety_app
description: "Youth Safety - SOS alerts, emergency contacts, and journey tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ---------- Firebase ----------
  firebase_core: ^4.6.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.2.0

  # ---------- State Management ----------
  provider: ^6.1.5

  # ---------- Local Notifications (used in Step 8 - FCM foreground display) ----------
  flutter_local_notifications: ^18.0.1

  # ---------- Location (used in SOS / Journey Tracking modules) ----------
  geolocator: ^13.0.2

  # ---------- Utilities ----------
  cupertino_icons: ^1.0.8
  intl: ^0.20.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  audioplayers: ^6.7.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/